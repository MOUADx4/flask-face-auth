{% extends "base.html" %}
{% block content %}

<div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">

    <h2 class="text-2xl font-semibold mb-6 text-gray-800">
        Créer un compte
    </h2>

    <form method="POST" class="flex flex-col gap-4">

        <!-- Email -->
        <input 
            type="email" 
            name="email" 
            placeholder="Adresse email"
            class="border border-gray-300 rounded px-3 py-2 
                   focus:outline-none focus:ring-2 focus:ring-blue-700"
            required
        >

        <!-- Password -->
        <input 
            type="password" 
            name="password" 
            placeholder="Mot de passe"
            class="border border-gray-300 rounded px-3 py-2 
                   focus:outline-none focus:ring-2 focus:ring-blue-700"
            required
        >

        <!-- Champ caché pour stocker l'image base64 -->
        <input type="hidden" name="face_image" id="face_image">

        <!-- Bouton capture visage -->
        <button 
            type="button"
            id="capture-face"
            class="bg-gray-700 text-white py-2 rounded hover:bg-gray-600 transition"
        >
            Capturer mon visage
        </button>

        <!-- Aperçu webcam -->
        <div class="flex justify-center mt-2">
            <video id="video" autoplay playsinline class="rounded shadow-md w-48 h-36 bg-black"></video>
        </div>

        <!-- Submit -->
        <button 
            type="submit"
            class="bg-blue-900 text-white py-2 rounded 
                   hover:bg-blue-800 transition mt-4"
        >
            S'inscrire
        </button>
    </form>

    <p class="text-sm text-gray-600 mt-4">
        Déjà un compte ?
        <a href="/login" class="text-blue-900 font-medium hover:underline">
            Se connecter
        </a>
    </p>

</div>

<!-- Script webcam -->
<script src="{{ url_for('static', filename='js/face_capture.js') }}"></script>

{% endblock %}
