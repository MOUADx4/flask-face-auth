{% extends "base.html" %}
{% block content %}

<div class="bg-white p-10 rounded-lg shadow-md max-w-2xl w-full">

    <h2 class="text-3xl font-semibold text-gray-800 mb-4">
        Dashboard
    </h2>

    <p class="text-gray-600 mb-6">
        Bienvenue dans votre tableau de bord, {{ session.user }}.
    </p>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

        <!-- Carte Profil -->
        <a href="/profile" 
           class="p-6 border rounded-lg hover:shadow transition bg-gray-50">
            <h3 class="text-xl font-semibold text-gray-800 mb-2">Profil</h3>
            <p class="text-gray-600 text-sm">Voir vos informations personnelles.</p>
        </a>

        <!-- Carte Déconnexion -->
        <a href="/logout" 
           class="p-6 border rounded-lg hover:shadow transition bg-gray-50">
            <h3 class="text-xl font-semibold text-gray-800 mb-2">Déconnexion</h3>
            <p class="text-gray-600 text-sm">Quitter votre session.</p>
        </a>

    </div>

</div>

{% endblock %}
